server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com https://via.placeholder.com; connect-src 'self' https://api.vendorvault.io;" always;

    # Gzip compression
    gzip             on;
    gzip_types       text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length  1000;
    gzip_comp_level  6;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires      1y;
        add_header   Cache-Control "public, immutable";
        access_log   off;
    }

    # Health check endpoint (used by Docker and Kubernetes)
    location /healthz {
        access_log  off;
        return      200 'ok\n';
        add_header  Content-Type text/plain;
    }

    # SPA fallback — all routes serve index.html (React Router handles routing)
    location / {
        try_files   $uri $uri/ /index.html;
        add_header  Cache-Control "no-cache, no-store, must-revalidate";
    }
}
