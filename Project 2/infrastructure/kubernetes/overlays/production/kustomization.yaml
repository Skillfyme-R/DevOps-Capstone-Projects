apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vendorvault

resources:
  - ../../base

images:
  - name: vendorvault-backend
    newTag: "latest"
  - name: vendorvault-frontend
    newTag: "latest"

# Production keeps full replica counts from base (3 backend, 2 frontend)
