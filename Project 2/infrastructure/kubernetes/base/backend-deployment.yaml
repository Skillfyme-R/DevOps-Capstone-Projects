apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendorvault-backend
  namespace: vendorvault
  labels:
    app: vendorvault-backend
    component: api
    tier: backend
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vendorvault-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vendorvault-backend
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8008"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: vendorvault-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend
          image: vendorvault/backend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8008
              name: http

          env:
            - name: VV_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: vendorvault-config
                  key: ENVIRONMENT
            - name: VV_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: vendorvault-config
                  key: DB_HOST
            - name: VV_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: vendorvault-config
                  key: DB_PORT
            - name: VV_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: vendorvault-config
                  key: DB_NAME
            - name: VV_DB_USER
              valueFrom:
                secretKeyRef:
                  name: vendorvault-secrets
                  key: DB_USER
            - name: VV_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vendorvault-secrets
                  key: DB_PASSWORD
            - name: VV_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vendorvault-secrets
                  key: REDIS_URL
            - name: VV_BACKEND_SECRET
              valueFrom:
                secretKeyRef:
                  name: vendorvault-secrets
                  key: BACKEND_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vendorvault-secrets
                  key: STRIPE_SECRET_KEY

          resources:
            requests:
              cpu:    "200m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8008
            initialDelaySeconds: 15
            periodSeconds:       10
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8008
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    3

          volumeMounts:
            - name: logs
              mountPath: /app/logs

      volumes:
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: vendorvault-backend
  namespace: vendorvault
spec:
  selector:
    app: vendorvault-backend
  ports:
    - name: http
      port: 8008
      targetPort: 8008
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vendorvault-backend-hpa
  namespace: vendorvault
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vendorvault-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
