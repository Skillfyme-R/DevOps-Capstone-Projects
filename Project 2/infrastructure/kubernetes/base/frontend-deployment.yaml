apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendorvault-frontend
  namespace: vendorvault
  labels:
    app: vendorvault-frontend
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vendorvault-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vendorvault-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    101  # nginx user
      containers:
        - name: frontend
          image: vendorvault/frontend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds:       10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds:       5

---
apiVersion: v1
kind: Service
metadata:
  name: vendorvault-frontend
  namespace: vendorvault
spec:
  selector:
    app: vendorvault-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vendorvault-ingress
  namespace: vendorvault
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - app.vendorvault.io
        - api.vendorvault.io
      secretName: vendorvault-tls
  rules:
    - host: app.vendorvault.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vendorvault-frontend
                port: { number: 80 }
    - host: api.vendorvault.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vendorvault-backend
                port: { number: 8008 }
