global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    platform:     vendorvault
    environment:  development

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:

  # VendorVault Backend API metrics
  - job_name: vendorvault-backend
    static_configs:
      - targets: ['backend:8008']
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (host metrics — CPU, memory, disk)
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # PostgreSQL exporter
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis exporter
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
