name: VendorVault CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

jobs:
  # ── Code Quality ─────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check — backend
        run: yarn workspace @vendorvault/backend type-check

      - name: Type check — frontend
        run: yarn workspace @vendorvault/app type-check

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     vv_test
          POSTGRES_PASSWORD: vv_test_password
          POSTGRES_DB:       vendorvault_test
        options: >-
          --health-cmd "pg_isready -U vv_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports: ['5433:5432']

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports: ['6381:6379']

    env:
      VV_ENVIRONMENT:      test
      VV_DB_HOST:          localhost
      VV_DB_PORT:          5433
      VV_DB_USER:          vv_test
      VV_DB_PASSWORD:      vv_test_password
      VV_DB_NAME:          vendorvault_test
      VV_REDIS_URL:        redis://localhost:6381
      VV_BACKEND_SECRET:   test-secret-at-least-64-characters-long-required-for-jwt-signing

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Run migrations
        run: yarn db:migrate

      - name: Run tests with coverage
        run: yarn test:ci

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: always()

  # ── Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }

      - name: Dependency audit
        run: yarn audit --level moderate

      - name: Trivy filesystem scan (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref:  '.'
          exit-code: '1'
          severity:  'CRITICAL'

  # ── Build Docker Images (local registry) ─────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    # Runs on every push so images are always verified buildable
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       infrastructure/docker/Dockerfile.backend
          push:       false   # local only — no registry push
          tags:       vendorvault-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       infrastructure/docker/Dockerfile.app
          push:       false   # local only — no registry push
          tags:       vendorvault-frontend:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=http://localhost:8008
            REACT_APP_ENVIRONMENT=development
            REACT_APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
