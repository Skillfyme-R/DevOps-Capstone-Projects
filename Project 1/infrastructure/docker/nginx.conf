# =============================================================================
# NexusFinance Nginx Configuration
#
# Handles:
#   1. SPA routing (React Router client-side routing)
#   2. Static asset caching (CSS, JS, images)
#   3. Security headers
#   4. Gzip compression
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    # Prevent clickjacking attacks (embedding your site in an iframe)
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Enable browser XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    # Control what info is sent in the Referer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Feature policy (disable unused browser features)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    # Compress text responses — typically 70% size reduction
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # ── Static Asset Caching ─────────────────────────────────────────────────
    # React adds content hashes to filenames (main.a3f8c2b1.js)
    # So we can cache for 1 year — if the file changes, it gets a new hash
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Health Check ─────────────────────────────────────────────────────────
    # Kubernetes liveness probe hits this endpoint
    location /healthz {
        access_log off;
        return 200 '{"status":"ok","service":"nexusfinance-frontend"}';
        add_header Content-Type application/json;
    }

    # ── SPA Routing ──────────────────────────────────────────────────────────
    # React Router handles navigation client-side.
    # But if a user refreshes /dashboard directly, Nginx must serve index.html
    # (not return 404) so React Router can handle the route.
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html — it contains links to latest hashed assets
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── API Proxy (for local development) ────────────────────────────────────
    # In production, API is on a different domain and uses CORS.
    # In the Nginx container (staging), you can proxy API requests here:
    # location /api/ {
    #     proxy_pass http://nexusfinance-backend:7007/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
