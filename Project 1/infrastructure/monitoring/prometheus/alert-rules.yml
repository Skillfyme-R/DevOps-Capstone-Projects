# =============================================================================
# NexusFinance Alerting Rules
#
# These rules fire when financial platform conditions require attention.
# Alerts go to Alertmanager → Slack, PagerDuty, or Email.
#
# Severity levels:
#   critical  — Service is down or data is at risk. Page on-call immediately.
#   warning   — Degraded performance. Investigate during business hours.
#   info      — Informational. No action required.
# =============================================================================

groups:

  # ── Availability Alerts ────────────────────────────────────────────────────
  - name: nexusfinance-availability
    rules:

      - alert: BackendDown
        expr:  up{job="nexusfinance-backend"} == 0
        for:   1m                          # Must be down for 1 minute before alerting
        labels:
          severity: critical
          team:     platform
        annotations:
          summary:     "NexusFinance Backend is DOWN"
          description: "Backend pod {{ $labels.instance }} has been unreachable for 1 minute."
          runbook:     "https://docs.nexusfinance.io/runbooks/backend-down"

      - alert: HighErrorRate
        # More than 5% of requests are returning 5xx errors
        expr: |
          (
            sum(rate(nexusfinance_http_request_duration_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(nexusfinance_http_request_duration_seconds_count[5m]))
          ) > 0.05
        for:   2m
        labels:
          severity: critical
        annotations:
          summary:     "High API error rate: {{ $value | humanizePercentage }}"
          description: "More than 5% of API requests are failing with 5xx errors."

  # ── Latency Alerts ────────────────────────────────────────────────────────
  - name: nexusfinance-latency
    rules:

      - alert: HighAPILatency
        # 95th percentile response time > 2 seconds
        expr: |
          histogram_quantile(0.95,
            sum by (le, route) (
              rate(nexusfinance_http_request_duration_seconds_bucket[5m])
            )
          ) > 2.0
        for:   5m
        labels:
          severity: warning
        annotations:
          summary:     "API latency high on {{ $labels.route }}"
          description: "95th percentile response time is {{ $value }}s (threshold: 2s)"

      - alert: PaymentAPISlowdown
        # Payment endpoints should be fast — alert if P95 > 5s
        expr: |
          histogram_quantile(0.95,
            sum by (le) (
              rate(nexusfinance_http_request_duration_seconds_bucket{route="/api/v1/payments"}[5m])
            )
          ) > 5.0
        for:   3m
        labels:
          severity: critical
          team:     payments
        annotations:
          summary:     "Payment API is responding slowly"
          description: "Payment P95 latency is {{ $value }}s. Investigate Stripe/payment provider."

  # ── Financial Anomaly Alerts ──────────────────────────────────────────────
  - name: nexusfinance-financial
    rules:

      - alert: HighFraudAlertRate
        # Unusual spike in fraud alerts — may indicate an attack or data breach
        expr:  rate(nexusfinance_fraud_alerts_total[5m]) > 10
        for:   2m
        labels:
          severity: critical
          team:     security
        annotations:
          summary:     "Fraud alert rate is unusually high"
          description: "{{ $value | humanize }} fraud alerts per second detected. Possible attack in progress."
          runbook:     "https://docs.nexusfinance.io/runbooks/fraud-response"

      - alert: TransactionVolumeDrop
        # Transaction volume drops 50% compared to same time yesterday
        # (could indicate an outage users aren't reporting)
        expr: |
          (
            sum(rate(nexusfinance_transactions_total[5m]))
            /
            sum(rate(nexusfinance_transactions_total[5m] offset 24h))
          ) < 0.5
        for:   10m
        labels:
          severity: warning
        annotations:
          summary:     "Transaction volume is 50% below normal"
          description: "Current transactions/min is much lower than usual. Check for silent failures."

  # ── Infrastructure Alerts ─────────────────────────────────────────────────
  - name: nexusfinance-infrastructure
    rules:

      - alert: HighMemoryUsage
        expr: |
          (
            nexusfinance_node_heap_used_bytes
            /
            nexusfinance_node_heap_total_bytes
          ) > 0.90
        for:   5m
        labels:
          severity: warning
        annotations:
          summary:     "Node.js heap memory is over 90%"
          description: "Pod {{ $labels.pod }} heap: {{ $value | humanizePercentage }}. Risk of OOM crash."

      - alert: DatabaseConnectionPoolExhausted
        # If connection pool is full, new queries will queue and slow down
        expr:  pg_stat_activity_count{state="active"} > 40
        for:   3m
        labels:
          severity: warning
        annotations:
          summary:     "PostgreSQL connection pool is nearly exhausted"
          description: "{{ $value }} active DB connections (pool max: 50)."

      - alert: RedisMemoryHigh
        expr:  redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for:   5m
        labels:
          severity: warning
        annotations:
          summary:     "Redis is using {{ $value | humanizePercentage }} of max memory"
          description: "Redis may start evicting keys soon. Review caching strategy."
