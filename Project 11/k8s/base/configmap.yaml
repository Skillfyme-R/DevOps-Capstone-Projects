apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsar-config
  namespace: pulsar-system
data:
  SPRING_PROFILES_ACTIVE: "docker"
  PULSAR_SERVER_PORT: "8080"
  PULSAR_DB_URL: "jdbc:postgresql://pulsar-postgres:5432/pulsar"
  PULSAR_DB_USERNAME: "pulsar"
  PULSAR_REDIS_HOST: "pulsar-redis"
  PULSAR_REDIS_PORT: "6379"
  PULSAR_SWEEPER_INTERVAL_MS: "30000"
  PULSAR_DEFAULT_LEASE_SECONDS: "60"
  PULSAR_JWT_ACCESS_TTL_MINUTES: "60"
  PULSAR_JWT_REFRESH_TTL_DAYS: "30"
  PULSAR_API_BASE_URL: "http://pulsar-server:8080"
