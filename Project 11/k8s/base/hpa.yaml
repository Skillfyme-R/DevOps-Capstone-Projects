apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pulsar-server-hpa
  namespace: pulsar-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pulsar-server-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
