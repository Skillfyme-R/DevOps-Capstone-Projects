apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsar-ui-deployment
  namespace: pulsar-system
  labels:
    app: pulsar-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulsar-ui
  template:
    metadata:
      labels:
        app: pulsar-ui
    spec:
      containers:
        - name: pulsar-ui
          image: reelforge/pulsar-ui:latest
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
