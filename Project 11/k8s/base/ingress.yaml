apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulsar-ingress
  namespace: pulsar-system
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - pulsar.reelforge.media
      secretName: pulsar-tls-cert # placeholder — populated by cert-manager in a real cluster
  rules:
    - host: pulsar.reelforge.media
      http:
        paths:
          - path: /api/pulsar
            pathType: Prefix
            backend:
              service:
                name: pulsar-server-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulsar-ui-service
                port:
                  number: 80
