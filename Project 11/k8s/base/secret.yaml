# Placeholder values only — never commit real secrets. In staging/production this
# manifest is replaced by values injected via a real secrets manager (e.g. External
# Secrets Operator, Sealed Secrets, or the CI/CD pipeline's secret store).
apiVersion: v1
kind: Secret
metadata:
  name: pulsar-secrets
  namespace: pulsar-system
type: Opaque
stringData:
  PULSAR_DB_PASSWORD: "REPLACE_ME_DB_PASSWORD"
  PULSAR_JWT_SECRET: "REPLACE_ME_JWT_SIGNING_SECRET_MIN_32_BYTES"
  PULSAR_WORKER_API_KEY: "REPLACE_ME_WORKER_API_KEY"
