name: pulsar-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: reelforge

jobs:
  java-build-test:
    name: Java build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # GitHub-hosted runners ship with a working Docker daemon, so Testcontainers-based
      # integration tests in pulsar-server/pulsar-core run here even though they can't
      # run in this local sandbox.
      - name: Build and verify
        run: mvn -pl pulsar-common,pulsar-core,pulsar-server,pulsar-worker-sdk -am clean verify

  ui-build:
    name: UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pulsar-ui/package-lock.json
      - name: Install & build
        working-directory: pulsar-ui
        run: |
          npm ci
          npm run build

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [java-build-test, ui-build]
    strategy:
      matrix:
        include:
          - image: pulsar-server
            dockerfile: docker/server/Dockerfile
            context: .
          - image: pulsar-worker-sdk-demo
            dockerfile: docker/worker/Dockerfile
            context: .
          - image: pulsar-ui
            dockerfile: pulsar-ui/Dockerfile
            context: pulsar-ui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: pulsar-staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"
      # Real cluster credentials come from the pulsar-staging GitHub environment's secrets —
      # never hardcode a kubeconfig. This step just shows the structural pattern.
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.PULSAR_STAGING_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
      - name: Apply manifests
        run: kubectl apply -k k8s/base
