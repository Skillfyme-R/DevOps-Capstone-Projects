server:
  port: ${PULSAR_SERVER_PORT:8080}

spring:
  application:
    name: pulsar-server
  datasource:
    url: ${PULSAR_DB_URL:jdbc:postgresql://localhost:5432/pulsar}
    username: ${PULSAR_DB_USERNAME:pulsar}
    password: ${PULSAR_DB_PASSWORD:pulsar}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${PULSAR_REDIS_HOST:localhost}
      port: ${PULSAR_REDIS_PORT:6379}

pulsar:
  scheduler:
    sweep-interval-ms: ${PULSAR_SWEEPER_INTERVAL_MS:30000}
    default-lease-seconds: ${PULSAR_DEFAULT_LEASE_SECONDS:60}
  security:
    worker-api-key: ${PULSAR_WORKER_API_KEY:pk_dev_local_key_change_me}
    cors:
      allowed-origins: ${PULSAR_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    jwt:
      secret: ${PULSAR_JWT_SECRET:dev-only-signing-secret-do-not-use-in-production-min-32-bytes}
      access-ttl-minutes: ${PULSAR_JWT_ACCESS_TTL_MINUTES:60}
      refresh-ttl-days: ${PULSAR_JWT_REFRESH_TTL_DAYS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: pulsar-server

logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    media.reelforge.pulsar: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
