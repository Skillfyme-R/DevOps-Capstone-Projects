run:
  timeout: 5m
  go: "1.22"

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/nexaflow-io/nexaflow
  govet:
    enable-all: true
  errcheck:
    check-type-assertions: true
  revive:
    rules:
      - name: exported
      - name: package-comments
      - name: error-return

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gofmt
    - goimports
    - revive
    - godot
    - misspell
    - unparam
  disable:
    - depguard
    - exhaustive
    - wsl

issues:
  exclude-rules:
    - path: "_test.go"
      linters: [errcheck]
    - text: "Error return value of .*(Close|Sync|Rollback|Encode).*"
      linters: [errcheck]
