global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: nexaflow

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: nexaflow-server
    static_configs:
      - targets: ["nexaflow-server:9090"]
    metrics_path: /metrics

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
