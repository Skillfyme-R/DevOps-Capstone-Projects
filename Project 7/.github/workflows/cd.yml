name: VaultFlow CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options: [staging, production]
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vaultflow

jobs:
  # ── Staging Deploy ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.app.vaultflow.io
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: vaultflow-staging
          location: us-central1
          project_id: ${{ secrets.GCP_PROJECT_STAGING }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install vaultflow deploy/helm/vaultflow \
            --namespace vaultflow \
            --create-namespace \
            --atomic \
            --timeout 10m \
            --set api.image.tag=${{ steps.tag.outputs.tag }} \
            --set ui.image.tag=${{ steps.tag.outputs.tag }} \
            --set api.secrets.jwtSecret="${{ secrets.JWT_SECRET_STAGING }}" \
            --set api.secrets.databaseUrl="${{ secrets.DATABASE_URL_STAGING }}" \
            --set api.secrets.redisUrl="${{ secrets.REDIS_URL_STAGING }}" \
            -f deploy/helm/vaultflow/values.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/vaultflow-api -n vaultflow --timeout=300s
          kubectl get pods -n vaultflow

  # ── Production Deploy ───────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
      url: https://app.vaultflow.io
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: vaultflow-prod
          location: us-central1
          project_id: ${{ secrets.GCP_PROJECT_PROD }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install vaultflow deploy/helm/vaultflow \
            --namespace vaultflow \
            --create-namespace \
            --atomic \
            --timeout 15m \
            --set api.image.tag=${{ steps.tag.outputs.tag }} \
            --set ui.image.tag=${{ steps.tag.outputs.tag }} \
            --set api.secrets.jwtSecret="${{ secrets.JWT_SECRET_PROD }}" \
            --set api.secrets.databaseUrl="${{ secrets.DATABASE_URL_PROD }}" \
            --set api.secrets.redisUrl="${{ secrets.REDIS_URL_PROD }}" \
            -f deploy/helm/vaultflow/values.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/vaultflow-api -n vaultflow --timeout=600s
          kubectl get pods -n vaultflow -o wide

      - name: Notify on failure
        if: failure()
        run: echo "Production deployment FAILED. Manual rollback may be required."
