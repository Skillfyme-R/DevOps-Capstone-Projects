{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vaultflow.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vaultflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "vaultflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "vaultflow.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.api.service.metricsPort | quote }}
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "vaultflow.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      terminationGracePeriodSeconds: 30
      containers:
        - name: vaultflow
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.httpPort }}
            - name: metrics
              containerPort: {{ .Values.api.service.metricsPort }}
          env:
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: VAULTFLOW_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultflow.fullname" . }}-secrets
                  key: jwt-secret
            - name: VAULTFLOW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultflow.fullname" . }}-secrets
                  key: database-url
            - name: VAULTFLOW_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultflow.fullname" . }}-secrets
                  key: redis-url
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/vaultflow
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "vaultflow.fullname" . }}-config
        - name: tmp
          emptyDir: {}
{{- end }}
