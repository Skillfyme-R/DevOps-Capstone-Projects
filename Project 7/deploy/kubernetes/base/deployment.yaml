apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultflow-api
  namespace: vaultflow
  labels:
    app.kubernetes.io/name: vaultflow
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultflow
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vaultflow
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vaultflow
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      terminationGracePeriodSeconds: 30
      containers:
        - name: vaultflow
          image: vaultflow/api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: VAULTFLOW_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VAULTFLOW_LOG_LEVEL
              value: "info"
            - name: VAULTFLOW_HTTP_PORT
              value: "9090"
            - name: VAULTFLOW_METRICS_PORT
              value: "9091"
            - name: VAULTFLOW_PROMETHEUS_ENABLED
              value: "true"
            - name: VAULTFLOW_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vaultflow-secrets
                  key: jwt-secret
            - name: VAULTFLOW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vaultflow-secrets
                  key: database-url
            - name: VAULTFLOW_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vaultflow-secrets
                  key: redis-url
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/vaultflow
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: vaultflow-config
        - name: tmp
          emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultflow-ui
  namespace: vaultflow
  labels:
    app.kubernetes.io/name: vaultflow
    app.kubernetes.io/component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultflow
      app.kubernetes.io/component: ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vaultflow
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: vaultflow-ui
          image: vaultflow/ui:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
