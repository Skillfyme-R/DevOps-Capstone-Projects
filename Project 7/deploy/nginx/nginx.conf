server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream is resolved at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        set $upstream http://vaultflow-api:9090;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        set $upstream http://vaultflow-api:9090;
        proxy_pass $upstream/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Fonts/images can be cached long-term (filenames don't change)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # JS/CSS: CRA already content-hashes filenames, so no-cache on the index
    # is enough — but don't set immutable on JS so deploys take effect immediately
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
