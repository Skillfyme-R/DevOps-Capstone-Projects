global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    platform: vaultflow
    environment: development

scrape_configs:
  - job_name: vaultflow-api
    static_configs:
      - targets: ['vaultflow-api:9091']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: redis
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
