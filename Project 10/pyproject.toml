[tool.ruff]
target-version = "py312"
line-length = 100
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008"]
exclude = ["deploypilot/db/migrations/"]

[tool.black]
line-length = 100
target-version = ["py312"]
exclude = "deploypilot/db/migrations"

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
exclude = ["deploypilot/db/migrations"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--strict-markers -q"
markers = [
    "integration: marks tests that require a real database and Redis",
    "slow: marks tests that take more than 5 seconds",
]

[tool.coverage.run]
source = ["deploypilot"]
omit = ["deploypilot/db/migrations/*", "tests/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
