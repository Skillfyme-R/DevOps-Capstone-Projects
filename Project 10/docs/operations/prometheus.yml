global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: deploypilot
    environment: development

scrape_configs:
  - job_name: deploypilot_api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: celery_worker
    static_configs:
      - targets: ["worker:5555"]   # Flower exposes Celery metrics
    scrape_interval: 30s

  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
