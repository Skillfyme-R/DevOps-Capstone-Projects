apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploypilot-worker
  namespace: deploypilot
  labels:
    app: deploypilot-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploypilot-worker
  template:
    metadata:
      labels:
        app: deploypilot-worker
        component: worker
    spec:
      serviceAccountName: deploypilot-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          image: cloudforge/deploypilot-worker:latest
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: deploypilot-secrets
                  key: database-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: deploypilot-secrets
                  key: celery-broker-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: deploypilot-secrets
                  key: secret-key
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: terraform-workdir
              mountPath: /tmp/deploypilot
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: terraform-workdir
          emptyDir:
            sizeLimit: "5Gi"
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploypilot-worker
  namespace: deploypilot
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/deploypilot-worker-role
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: deploypilot-worker-hpa
  namespace: deploypilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deploypilot-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
