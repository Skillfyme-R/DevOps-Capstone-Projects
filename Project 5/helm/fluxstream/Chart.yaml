apiVersion: v2
name: fluxstream
description: FluxStream — Enterprise OTT Streaming Platform Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ott
  - streaming
  - saas
  - elixir
  - graphql
home: https://fluxstream.io
maintainers:
  - name: FluxStream Technologies
    email: platform@fluxstream.io
dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: rabbitmq
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
