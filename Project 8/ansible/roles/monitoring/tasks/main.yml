---
- name: Download CloudWatch agent RPM
  ansible.builtin.get_url:
    url: https://s3.amazonaws.com/amazoncloudwatch-agent/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm
    dest: /tmp/amazon-cloudwatch-agent.rpm
    mode: "0644"
  tags: cloudwatch

- name: Install CloudWatch agent
  ansible.builtin.dnf:
    name: /tmp/amazon-cloudwatch-agent.rpm
    state: present
    disable_gpg_check: yes
  tags: cloudwatch

- name: Create CloudWatch agent configuration directory
  ansible.builtin.file:
    path: /opt/aws/amazon-cloudwatch-agent/etc
    state: directory
    mode: "0755"
  tags: cloudwatch

- name: Write CloudWatch agent configuration
  ansible.builtin.copy:
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    mode: "0644"
    content: |
      {
        "agent": {
          "metrics_collection_interval": 60,
          "logfile": "/opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log"
        },
        "metrics": {
          "namespace": "{{ project_name }}/Nodes",
          "metrics_collected": {
            "cpu": {
              "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
              "metrics_collection_interval": 60
            },
            "mem": {
              "measurement": ["mem_used_percent", "mem_available"],
              "metrics_collection_interval": 60
            },
            "disk": {
              "measurement": ["disk_used_percent"],
              "metrics_collection_interval": 60,
              "resources": ["/"]
            },
            "net": {
              "measurement": ["net_bytes_sent", "net_bytes_recv"],
              "metrics_collection_interval": 60
            }
          }
        },
        "logs": {
          "logs_collected": {
            "files": {
              "collect_list": [
                {
                  "file_path": "/var/log/messages",
                  "log_group_name": "{{ cloudwatch_log_group }}",
                  "log_stream_name": "{instance_id}/messages"
                },
                {
                  "file_path": "/var/log/secure",
                  "log_group_name": "{{ cloudwatch_log_group }}",
                  "log_stream_name": "{instance_id}/secure"
                },
                {
                  "file_path": "/var/log/audit/audit.log",
                  "log_group_name": "{{ cloudwatch_log_group }}",
                  "log_stream_name": "{instance_id}/audit"
                }
              ]
            }
          },
          "log_stream_name": "{instance_id}"
        }
      }
  tags: cloudwatch

- name: Start and enable CloudWatch agent
  ansible.builtin.service:
    name: amazon-cloudwatch-agent
    state: started
    enabled: yes
  ignore_errors: yes
  tags: cloudwatch
