apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartflow-api
  namespace: cartflow
  labels:
    app: cartflow-api
    component: backend
    version: "2.0.0"
    managed-by: jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cartflow-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cartflow-api
        component: backend
        version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics/summary"
        prometheus.io/port: "5000"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: cartflow-api
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/cartflow:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cartflow-config
          env:
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: cartflow-config
                  key: APP_VERSION
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cartflow-api
                topologyKey: kubernetes.io/hostname
