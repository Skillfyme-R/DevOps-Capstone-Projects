apiVersion: v1
kind: Service
metadata:
  name: cartflow-api-service
  namespace: cartflow
  labels:
    app: cartflow-api
    component: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  selector:
    app: cartflow-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
  sessionAffinity: None
