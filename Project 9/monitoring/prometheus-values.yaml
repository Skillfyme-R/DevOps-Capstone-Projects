prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 50GB

    walCompression: true

    scrapeInterval: "30s"
    evaluationInterval: "30s"

    externalLabels:
      cluster: medicart-dev-cluster
      region: us-east-1
      platform: medicart-healthcare

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 50Gi

    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      fsGroup: 65534

    # Additional scrape configs for MediCart API
    additionalScrapeConfigs:
      - job_name: medicart-api
        static_configs:
          - targets: ['medicart-api.medicart.svc.cluster.local:8080']
        metrics_path: /metrics
        scrape_interval: 15s

  # Alert rules for MediCart Healthcare Platform
  additionalPrometheusRulesMap:
    medicart-rules:
      groups:
        - name: medicart.api
          rules:
            - alert: MediCartAPIHighErrorRate
              expr: rate(flask_http_request_total{status=~"5.."}[5m]) > 0.05
              for: 5m
              labels:
                severity: critical
                platform: medicart
              annotations:
                summary: "MediCart API error rate exceeds 5%"
                description: "{{ $labels.instance }} has >5% 5xx error rate"

            - alert: MediCartAPIHighLatency
              expr: histogram_quantile(0.99, rate(flask_http_request_duration_seconds_bucket[5m])) > 2
              for: 5m
              labels:
                severity: warning
                platform: medicart
              annotations:
                summary: "MediCart API p99 latency exceeds 2 seconds"

            - alert: MediCartPodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total{namespace="medicart"}[15m]) > 0
              for: 5m
              labels:
                severity: critical
                platform: medicart
              annotations:
                summary: "MediCart pod is crash looping"

grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  securityContext:
    runAsNonRoot: true
    runAsUser: 472

  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.medicart.health
    tls:
      - secretName: grafana-medicart-tls
        hosts:
          - grafana.medicart.health

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: medicart
          orgId: 1
          folder: MediCart
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/medicart

  dashboards:
    medicart:
      medicart-overview:
        gnetId: 11159
        revision: 1
        datasource: Prometheus
      kubernetes-cluster:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
