---
- name: Configure MediCart EKS Worker Nodes
  hosts: eks_nodes
  become: true
  vars:
    aws_region: "us-east-1"
    ecr_registry: "ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com"
    platform: "medicart-platform"
    environment: "dev"

  tasks:
    - name: Install AWS and platform tools
      yum:
        name:
          - amazon-ssm-agent
          - awscli
          - jq
          - htop
        state: present

    - name: Start and enable SSM Agent
      service:
        name: amazon-ssm-agent
        state: started
        enabled: yes

    - name: Authenticate Docker with ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
          docker login --username AWS --password-stdin {{ ecr_registry }}
      changed_when: false

    - name: Pull latest MediCart API image
      shell: |
        docker pull {{ ecr_registry }}/medicart-api:latest
      changed_when: false

    - name: Configure CloudWatch Agent
      copy:
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
        content: |
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/medicart/*.log",
                      "log_group_name": "/medicart/{{ environment }}/app",
                      "log_stream_name": "{instance_id}",
                      "timezone": "UTC"
                    }
                  ]
                }
              }
            },
            "metrics": {
              "namespace": "MediCart/{{ environment }}",
              "metrics_collected": {
                "cpu": { "measurement": ["cpu_usage_active"], "metrics_collection_interval": 60 },
                "mem": { "measurement": ["mem_used_percent"], "metrics_collection_interval": 60 },
                "disk": { "measurement": ["used_percent"], "metrics_collection_interval": 60 }
              }
            }
          }
        owner: root
        mode: "0644"

    - name: Start CloudWatch Agent
      service:
        name: amazon-cloudwatch-agent
        state: started
        enabled: yes

    - name: Apply MediCart node labels
      shell: |
        NODE=$(curl -s http://169.254.169.254/latest/meta-data/local-hostname)
        kubectl label node "$NODE" \
          company.medicart/platform=medicart-platform \
          company.medicart/environment={{ environment }} \
          --overwrite
      changed_when: false
      ignore_errors: true
