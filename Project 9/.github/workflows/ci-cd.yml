name: MediCart Platform — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: medicart-dev-cluster
  ECR_REPOSITORY: medicart-api
  HELM_RELEASE: medicart
  HELM_NAMESPACE: medicart

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Code Quality & Tests
  # ---------------------------------------------------------------------------
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r docker/requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest docker/src/tests/ scripts/tests/ \
            --cov=docker/src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 2: Terraform Validate
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan (dev)
        run: |
          terraform init \
            -backend-config="bucket=medicart-tfstate-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform plan \
            -var-file="../environments/dev/terraform.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD_DEV }}" \
            -out=tfplan-dev
        working-directory: terraform

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: terraform/tfplan-dev

  # ---------------------------------------------------------------------------
  # Job 3: Build & Push Docker Image
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.meta.outputs.image_tag }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            docker/

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ---------------------------------------------------------------------------
  # Job 4: Deploy to EKS (Dev)
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to EKS — Dev
    runs-on: ubuntu-latest
    needs: [terraform-validate, build-push]
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Deploy MediCart via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} helm/medicart \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --values helm/medicart/values-dev.yaml \
            --set image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.build-push.outputs.image_tag }} \
            --wait \
            --timeout 5m

      - name: Verify deployment rollout
        run: |
          kubectl rollout status deployment/medicart-api \
            -n ${{ env.HELM_NAMESPACE }} \
            --timeout=120s

      - name: Smoke test — health endpoint
        run: |
          POD=$(kubectl get pod -n ${{ env.HELM_NAMESPACE }} -l app.kubernetes.io/name=medicart -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n ${{ env.HELM_NAMESPACE }} "$POD" -- \
            python -c "import urllib.request; r=urllib.request.urlopen('http://localhost:8080/health'); assert r.status==200"
          echo "Health check passed"
