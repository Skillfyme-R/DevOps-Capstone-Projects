name: MediNova Health Solutions — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: medinova/appointment-api
  EKS_CLUSTER: medinova-dev-cluster
  HELM_RELEASE: medinova
  HELM_NAMESPACE: medinova

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test & Quality Gate
  # ---------------------------------------------------------------------------
  test:
    name: Test & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with coverage
        run: |
          cd app
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 2: Terraform Validate
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan — Dev
        run: |
          terraform init \
            -backend-config="bucket=medinova-tfstate-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=medinova/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform plan \
            -var-file="environments/dev/terraform.tfvars" \
            -var="db_master_password=${{ secrets.DB_PASSWORD_DEV }}" \
            -var="patient_records_bucket=medinova-dev-patient-records-${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="app_assets_bucket=medinova-dev-app-assets-${{ secrets.AWS_ACCOUNT_ID }}" \
            -out=tfplan-dev
        working-directory: terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: terraform/tfplan-dev

  # ---------------------------------------------------------------------------
  # Job 3: Build & Push Container Image
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: tag
        run: |
          TAG="$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-8)"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.tag.outputs.image_tag }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.image_tag }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            app/

      - name: Push to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.image_tag }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ---------------------------------------------------------------------------
  # Job 4: Deploy to EKS (Dev)
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to Dev — EKS
    runs-on: ubuntu-latest
    needs: [terraform-validate, build-push]
    environment: dev

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Deploy via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} helm/medinova \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.build-push.outputs.image_tag }} \
            --set env[0].value=dev \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: kubectl rollout status deployment/medinova-api -n ${{ env.HELM_NAMESPACE }} --timeout=120s

      - name: Smoke test
        run: |
          POD=$(kubectl get pod -n ${{ env.HELM_NAMESPACE }} -l app.kubernetes.io/name=medinova -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n ${{ env.HELM_NAMESPACE }} "$POD" -- \
            python -c "import urllib.request; r=urllib.request.urlopen('http://localhost:8080/health'); assert r.status==200"
          echo "MediNova smoke test passed"
