apiVersion: v1
kind: Service
metadata:
  name: {{ include "medicart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "medicart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector: {{- include "medicart.selectorLabels" . | nindent 4 }}
