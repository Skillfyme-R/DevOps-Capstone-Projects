apiVersion: v1
kind: Service
metadata:
  name: {{ include "medinova.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "medinova.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector: {{- include "medinova.selectorLabels" . | nindent 4 }}
