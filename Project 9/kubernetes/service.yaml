apiVersion: v1
kind: Service
metadata:
  name: medicart-api
  namespace: medicart
  labels:
    app: medicart-api
    app.kubernetes.io/part-of: medicart-platform
spec:
  type: ClusterIP
  selector:
    app: medicart-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
