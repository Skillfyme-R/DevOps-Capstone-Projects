sonar.projectKey=medicart-platform
sonar.projectName=MediCart Healthcare Platform
sonar.projectVersion=1.0.0
sonar.organization=medicart-health

sonar.sources=docker/src,scripts
sonar.tests=docker/src/tests,scripts/tests
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11

sonar.exclusions=**/__pycache__/**,**/*.pyc,**/node_modules/**
sonar.coverage.exclusions=**/tests/**,**/__init__.py

# Quality gate: 80% coverage minimum
sonar.qualitygate.wait=true
