name: MediCore Deploy Pipeline

on:
  workflow_run:
    workflows: ["MediCore CI Pipeline"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: staging
        type: choice
        options: [staging, production]
      strategy:
        description: 'Deployment strategy'
        required: true
        default: rolling
        type: choice
        options: [rolling, canary, blue-green]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/medicore

jobs:
  determine-environment:
    name: Determine Target Environment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      strategy: ${{ steps.env.outputs.strategy }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "strategy=${{ github.event.inputs.strategy }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "strategy=rolling" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "strategy=rolling" >> $GITHUB_OUTPUT
          fi

  push-images:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: [determine-environment]
    strategy:
      matrix:
        service: [auth, patients, appointments, analytics, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service == 'frontend' && 'infrastructure/docker/Dockerfile.frontend' || 'infrastructure/docker/Dockerfile.service' }}
          build-args: ${{ matrix.service != 'frontend' && format('SERVICE={0}', matrix.service) || '' }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest

  deploy-staging:
    name: Deploy to Staging (Rolling)
    runs-on: ubuntu-latest
    needs: [determine-environment, push-images]
    if: needs.determine-environment.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.medicore.health
    steps:
      - uses: actions/checkout@v4

      - name: Update Kustomize image tags
        run: |
          cd infrastructure/kubernetes/overlays/staging
          for svc in auth patients appointments analytics frontend; do
            kustomize edit set image medicore/$svc-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$svc:${{ github.sha }}
          done

      - name: Commit manifest update
        run: |
          git config user.name "MediCore CI Bot"
          git config user.email "ci@medicore.health"
          git add infrastructure/kubernetes/overlays/staging/kustomization.yaml
          git commit -m "ci(deploy): update staging image tags to ${{ github.sha }}"
          git push

      - name: Verify staging health
        run: |
          echo "Staging deployment triggered via manifest update"
          echo "GitOps controller will sync automatically"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [determine-environment, push-images]
    if: needs.determine-environment.outputs.environment == 'production'
    environment:
      name: production
      url: https://app.medicore.health
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig.yml
          echo "KUBECONFIG=$(pwd)/kubeconfig.yml" >> $GITHUB_ENV

      - name: Run pre-deployment database migrations
        run: |
          echo "Running database migrations before deployment..."
          kubectl run mc-migrate-${{ github.sha }} \
            --image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth:${{ github.sha }} \
            --namespace=medicore \
            --restart=Never \
            --rm \
            --env="MEDICORE_DB_HOST=${{ secrets.PROD_DB_HOST }}" \
            --command -- node -e "require('./dist/config/knexfile').default" || true

      - name: Helm upgrade production
        run: |
          helm upgrade --install medicore infrastructure/helm/medicore \
            --namespace medicore \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set platform.environment=production \
            --values infrastructure/helm/medicore/values.yaml \
            --atomic \
            --timeout 10m \
            --wait

      - name: Smoke test production
        run: |
          sleep 30
          kubectl rollout status deployment/medicore-auth -n medicore --timeout=5m
          kubectl rollout status deployment/medicore-frontend -n medicore --timeout=5m

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.sha }}
          release_name: MediCore Production Release ${{ github.sha }}
          body: |
            ## MediCore Production Deployment
            - Commit: ${{ github.sha }}
            - Services: auth, patients, appointments, analytics, frontend
            - Strategy: ${{ needs.determine-environment.outputs.strategy }}
          draft: false
          prerelease: false
