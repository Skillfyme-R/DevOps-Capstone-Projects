apiVersion: v2
name: medicore
description: MediCore — Enterprise Healthcare Cloud Platform Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - healthcare
  - ehr
  - clinical
  - fhir
  - hipaa
home: https://medicore.health
maintainers:
  - name: Skillfyme Platform Team
    email: platform@skillfyme.in
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
