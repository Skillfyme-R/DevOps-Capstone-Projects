apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicore-frontend
  namespace: medicore
  labels:
    app: medicore-frontend
    component: frontend
    platform: medicore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medicore-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: medicore-frontend
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      terminationGracePeriodSeconds: 15
      containers:
        - name: nginx
          image: medicore/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: medicore-frontend
  namespace: medicore
  labels:
    app: medicore-frontend
spec:
  selector:
    app: medicore-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medicore-ingress
  namespace: medicore
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.medicore.health
      secretName: medicore-tls
  rules:
    - host: app.medicore.health
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medicore-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: medicore-gateway
                port:
                  number: 8090
