global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: medicore
    environment: development

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: medicore-auth
    static_configs:
      - targets: ['medicore-auth:9001']
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: medicore-auth

  - job_name: medicore-patients
    static_configs:
      - targets: ['medicore-patients:9002']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: medicore-patients

  - job_name: medicore-appointments
    static_configs:
      - targets: ['medicore-appointments:9003']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: medicore-appointments

  - job_name: medicore-analytics
    static_configs:
      - targets: ['medicore-analytics:9005']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: medicore-analytics

  - job_name: postgres
    static_configs:
      - targets: ['mc_postgres:9187']

  - job_name: redis
    static_configs:
      - targets: ['mc_redis:9121']
