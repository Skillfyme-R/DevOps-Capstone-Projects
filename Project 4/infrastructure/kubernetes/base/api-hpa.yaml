apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shieldgrid-api
  namespace: shieldgrid
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shieldgrid-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
