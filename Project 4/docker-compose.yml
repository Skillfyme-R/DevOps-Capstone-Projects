name: shieldgrid

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shieldgrid-postgres
    environment:
      POSTGRES_USER: shieldgrid
      POSTGRES_PASSWORD: shieldgrid
      POSTGRES_DB: shieldgrid
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shieldgrid -d shieldgrid"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [shieldgrid-net]
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shieldgrid-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [shieldgrid-net]
    restart: unless-stopped

  # ─── API (Backend) ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: shieldgrid-api
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-change-in-production-must-be-long
      DATABASE_URL: postgresql+asyncpg://shieldgrid:shieldgrid@postgres:5432/shieldgrid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ALLOWED_ORIGINS: '["http://localhost:3001","http://localhost:80"]'
      PROMETHEUS_ENABLED: "true"
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro  # hot-reload in dev
    networks: [shieldgrid-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: shieldgrid-worker
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      ENVIRONMENT: development
      SECRET_KEY: dev-secret-key-change-in-production-must-be-long
      DATABASE_URL: postgresql+asyncpg://shieldgrid:shieldgrid@postgres:5432/shieldgrid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [shieldgrid-net]
    restart: unless-stopped

  # ─── Dashboard (Frontend) ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: shieldgrid-dashboard
    ports:
      - "3001:80"
    depends_on:
      - api
    networks: [shieldgrid-net]
    restart: unless-stopped

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: shieldgrid-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [shieldgrid-net]
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: shieldgrid-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: shieldgrid
      GF_SERVER_ROOT_URL: http://localhost:4001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "4001:3000"
    depends_on:
      - prometheus
    networks: [shieldgrid-net]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  shieldgrid-net:
    driver: bridge
