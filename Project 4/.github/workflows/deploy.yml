name: ShieldGrid Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, prod]
      image_tag:
        description: Image tag to deploy (default = latest sha)
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/shieldgrid
  AWS_REGION: us-east-1

jobs:
  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-24.04
    environment:
      name: staging
      url: https://staging.shieldgrid.io
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name shieldgrid-staging --region ${{ env.AWS_REGION }}

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || format('sha-{0}', github.sha) }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Inject secrets from AWS Secrets Manager
        run: |
          aws secretsmanager get-secret-value \
            --secret-id shieldgrid/staging/api-env \
            --query SecretString --output text > \
            infrastructure/kubernetes/overlays/staging/api-secret.env

      - name: Update image tags in overlay
        run: |
          sed -i "s/DEPLOY_TAG/${{ steps.tag.outputs.tag }}/g" \
            infrastructure/kubernetes/overlays/staging/kustomization.yaml

      - name: Apply manifests
        run: kubectl apply -k infrastructure/kubernetes/overlays/staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/shieldgrid-api \
            -n shieldgrid --timeout=5m

      - name: Run smoke tests
        run: |
          HEALTH=$(curl -sf https://staging.shieldgrid.io/api/v1/health | jq -r .status)
          [ "$HEALTH" = "ok" ] && echo "Smoke test passed" || (echo "Smoke test FAILED"; exit 1)

  # ─── Production Gate ──────────────────────────────────────────────────────────
  promote-prod:
    name: Production Approval Gate
    runs-on: ubuntu-24.04
    needs: deploy-staging
    environment:
      name: prod
      url: https://app.shieldgrid.io
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'prod'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name shieldgrid-prod --region ${{ env.AWS_REGION }}

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Inject production secrets
        run: |
          aws secretsmanager get-secret-value \
            --secret-id shieldgrid/prod/api-env \
            --query SecretString --output text > \
            infrastructure/kubernetes/overlays/prod/api-secret.env

      - name: Update image tags
        run: |
          sed -i "s/DEPLOY_TAG/${{ steps.tag.outputs.tag }}/g" \
            infrastructure/kubernetes/overlays/prod/kustomization.yaml

      - name: Apply production manifests
        run: kubectl apply -k infrastructure/kubernetes/overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/shieldgrid-api \
            -n shieldgrid --timeout=10m

      - name: Production smoke test
        run: |
          HEALTH=$(curl -sf https://app.shieldgrid.io/api/v1/health | jq -r .status)
          [ "$HEALTH" = "ok" ] && echo "Production smoke test PASSED" || (echo "FAILED"; exit 1)

      - name: Create GitHub Deployment
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment-url: https://app.shieldgrid.io
          state: success

  # ─── Rollback on Failure ──────────────────────────────────────────────────────
  rollback-prod:
    name: Rollback Production
    runs-on: ubuntu-24.04
    needs: promote-prod
    if: failure()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name shieldgrid-prod --region ${{ env.AWS_REGION }}

      - name: Rollback API deployment
        run: kubectl rollout undo deployment/shieldgrid-api -n shieldgrid

      - name: Notify on-call
        if: always()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text": ":rotating_light: ShieldGrid production rollback triggered — check GitHub Actions"}'
